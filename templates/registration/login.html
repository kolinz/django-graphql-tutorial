<!DOCTYPE html>
<!-- ファイルパス: templates/registration/login.html -->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン | LunchTime Review</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container">
  <div class="row justify-content-center mt-5">
    <div class="col-12 col-sm-8 col-md-5">

      <div class="text-center mb-4">
        <h1 class="h3 fw-bold text-success">🍱 LunchTime Review</h1>
        <p class="text-muted">ログインしてください</p>
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-4">

          {% if form.errors %}
          <div class="alert alert-danger">
            ユーザー名またはパスワードが正しくありません。
          </div>
          {% endif %}

          <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">

            <div class="mb-3">
              <label for="id_username" class="form-label">ユーザー名</label>
              <input type="text" name="username" id="id_username"
                     class="form-control" autofocus autocomplete="username"
                     value="{{ form.username.value|default_if_none:'' }}">
            </div>

            <div class="mb-3">
              <label for="id_password" class="form-label">パスワード</label>
              <input type="password" name="password" id="id_password"
                     class="form-control" autocomplete="current-password">
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-success">ログイン</button>
            </div>
          </form>

        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
